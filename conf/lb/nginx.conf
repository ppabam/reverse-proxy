
user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;

worker_rlimit_nofile 131072; # 열린 파일 디스크립터 수 증가

events {
    worker_connections  65535;
    use epoll;                # Linux에서 효율적인 이벤트 처리 방식
    multi_accept on;          # 여러 연결을 동시에 수락
}


http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;
    # access_log  off;
    error_log   /var/log/nginx/error.log notice;

    sendfile        on;
    #tcp_nopush     on;
    tcp_nopush      off;  # 성능 최적화를 위해 활성화
    tcp_nodelay     on;  # 작은 패킷 전송 시 지연 감소

    # keepalive_timeout  65;
    keepalive_timeout  0;  # 65초 -> 15초로 감소하여 리소스 절약
    keepalive_requests 1; # 한 연결당 최대 요청 수 설정

    # 버퍼링 설정 최적화
    client_body_buffer_size 128k;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 4k;

    gzip  on;

    include /etc/nginx/conf.d/*.conf;
}
