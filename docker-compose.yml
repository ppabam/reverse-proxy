services:
  controller:
    image: ngrinder/controller
    restart: always
    ports:
      - "9000:80"
      - "16001:16001"
      - "12000-12009:12000-12009"
    volumes:
      - ./ngrinder-controller:/opt/ngrinder-controller
    deploy:
      resources:
        limits:
          cpus: "2.0"

  agent:
    image: ngrinder/agent
    restart: always
    links:
      - controller
    deploy:
      resources:
        limits:
          cpus: "2.0"

  api:
    build:
      context: .
      dockerfile: docker/fastapi/Dockerfile
    expose:
      - "80"
    environment:
      - VIRTUAL_HOST=172.17.0.1,localhost,127.0.0.1,172.18.0.4
      - VIRTUAL_PORT=80
    volumes:
      - ./main.py:/code/main.py
    deploy:
      resources:
        limits:
          cpus: "1.95"
          memory: "256M"

  lb:
    image: nginxproxy/nginx-proxy # https://github.com/nginx-proxy/nginx-proxy
    ports:
      - "8949:80"
    volumes:
      - /var/run/docker.sock:/tmp/docker.sock:ro
      - ./conf/lb/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api

